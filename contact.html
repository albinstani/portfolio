<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact - FolioOne</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#081620;
      color:#fff;
      font-family:'Poppins',sans-serif;
    }

    /* ================= HEADER ================= */

    .header{
      background:#081620;
      border-bottom:1px solid rgba(255,255,255,0.08);
      padding:15px 0;
      position:sticky;
      top:0;
      z-index:999;
    }

    /* NAVBAR */

    .navbar-nav{
      gap:22px;
    }

    .navbar-nav .nav-link{
      color:#fff;
      font-size:14px;
      font-weight:500;
      position:relative;
      transition:0.3s;
    }

    .navbar-nav .nav-link:hover{
      color:#11a8ff;
    }

    /* ACTIVE */

    .navbar-nav .nav-link.active{
      color:#11a8ff;
    }

    .navbar-nav .nav-link.active::after{
      content:'';
      position:absolute;
      left:0;
      bottom:-7px;
      width:100%;
      height:2px;
      background:#11a8ff;
      border-radius:10px;
    }

    /* SOCIAL ICONS */

    .header-social-links{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .header-social-links a{
      color:#c2ccd3;
      font-size:18px;
      transition:0.3s;
    }

    .header-social-links a:hover{
      color:#11a8ff;
    }

    /* TOGGLER */

    .navbar-toggler{
      border:none;
      box-shadow:none !important;
      padding:0;
    }

    .navbar-toggler i{
      color:#fff;
      font-size:34px;
    }

    /* CONTACT */

    .contact{
      padding:80px 0;
    }

    .section-title{
      text-align:center;
      margin-bottom:50px;
    }

    .section-title h2{
      font-size:38px;
      font-weight:700;
      margin-bottom:10px;
    }

    .section-title p{
      color:#9fb0bc;
      font-size:14px;
      max-width:600px;
      margin:auto;
      line-height:1.8;
    }

    /* BOX */

    .contact-box{
      background:#0d1d29;
      border-radius:18px;
      padding:35px;
      height:100%;
      border:1px solid rgba(255,255,255,0.05);
    }

    .contact-box h3{
      margin-bottom:25px;
      font-size:24px;
      font-weight:600;
    }

    /* INFO */

    .info-item{
      display:flex;
      align-items:center;
      margin-bottom:22px;
    }

    .info-item i{
      color:#11a8ff;
      font-size:20px;
      margin-right:14px;
    }

    .info-item p{
      margin:0;
      color:#d4dde4;
      font-size:14px;
    }

    /* FORM */

    .form-control{
      background:#122735;
      border:none;
      height:50px;
      color:#fff;
      border-radius:10px;
      padding:12px 16px;
      font-size:14px;
    }

    textarea.form-control{
      height:auto;
    }

    .form-control::placeholder{
      color:#94a4af;
    }

    .form-control:focus{
      background:#122735;
      color:#fff;
      box-shadow:none;
      border:1px solid #11a8ff;
    }

    /* BUTTON */

    .btn-primary{
      background:#11a8ff;
      border:none;
      padding:11px 30px;
      border-radius:10px;
      font-size:14px;
      font-weight:500;
    }

    .btn-primary:hover{
      background:#0c92df;
    }

    /* FOOTER */

    .footer{
      border-top:1px solid rgba(255,255,255,0.08);
      padding:25px 0;
      background:#081620;
      margin-top:40px;
      text-align:center;
    }

    .footer p{
      margin:0;
      color:#b7c2ca;
      font-size:13px;
    }

    /* ================= MOBILE ================= */

    @media(max-width:991px){

      /* DESKTOP ORDER CHANGE */

      .navbar{
        display:flex;
        justify-content:space-between;
        align-items:center;
      }

      /* MENU OPEN STYLE */

      .navbar-collapse{
        position:absolute;
        top:70px;
        left:0;
        width:100%;
        background:#0d1d29;
        padding:20px;
        border-radius:0 0 15px 15px;
      }

      .navbar-nav{
        gap:10px;
      }

      .navbar-nav .nav-link{
        font-size:15px;
      }

    }

  </style>

</head>

<body>

  <!-- ================= HEADER ================= -->

  <header class="header">

    <div class="container">

      <nav class="navbar navbar-expand-lg align-items-center justify-content-between">

        <!-- LEFT SIDE MENU -->

        <div class="collapse navbar-collapse order-lg-1" id="navbarNav">

          <ul class="navbar-nav">

            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="about.html">About</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="resume.html">Resume</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="services.html">Services</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="portfolio.html">Portfolio</a>
            </li>

            <li class="nav-item">
              <a class="nav-link active" href="contact.html">Contact</a>
            </li>

          </ul>

        </div>

        <!-- RIGHT SIDE ICONS DESKTOP -->

        <div class="header-social-links d-none d-lg-flex order-lg-2">

          <a href="https://github.com/albinstani">
            <i class="bi bi-github"></i>
          </a>

          <a href="https://www.instagram.com/_albin_stanli_">
            <i class="bi bi-instagram"></i>
          </a>

          <a href="https://www.linkedin.com/in/albin-stanli-ba09223ab/">
            <i class="bi bi-linkedin"></i>
          </a>

        </div>

        <!-- MOBILE LEFT ICONS -->

        <div class="header-social-links d-flex d-lg-none">

          <a href="https://github.com/albinstani">
            <i class="bi bi-github"></i>
          </a>

          <a href="https://www.instagram.com/_albin_stanli_">
            <i class="bi bi-instagram"></i>
          </a>

          <a href="https://www.linkedin.com/in/albin-stanli-ba09223ab/">
            <i class="bi bi-linkedin"></i>
          </a>

        </div>

        <!-- MOBILE MENU BUTTON RIGHT -->

        <button class="navbar-toggler d-lg-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

          <i class="bi bi-list"></i>

        </button>

      </nav>

    </div>

  </header>

  <!-- ================= CONTACT ================= -->

  <section class="contact">

    <div class="container">

      <div class="section-title">

        <h2>Contact</h2>

        <p>
          Feel free to contact me for projects,
          collaborations or freelance work.
        </p>

      </div>

      <div class="row g-4">

        <!-- LEFT -->

        <div class="col-lg-5">

          <div class="contact-box">

            <h3>Contact Info</h3>

            <div class="info-item">

              <i class="bi bi-geo-alt-fill"></i>

              <p>Kochi, Kerala</p>

            </div>

            <div class="info-item">

              <i class="bi bi-telephone-fill"></i>

              <p>+91 90612 25413</p>

            </div>

            <div class="info-item">

              <i class="bi bi-envelope-fill"></i>

              <p>albinstani@gmail.com</p>

            </div>

          </div>

        </div>

        <!-- RIGHT -->

        <div class="col-lg-7">

          <div class="contact-box">

            <h3>Send Message</h3>

            <form action="https://formspree.io/f/mojbvopw" method="POST">

              <div class="row gy-3">

                <div class="col-md-6">

                  <input
                    type="text"
                    name="name"
                    class="form-control"
                    placeholder="Your Name"
                    required
                    oninput="this.value=this.value.replace(/[^A-Za-z ]/g,'')">

                </div>

                <div class="col-md-6">

                  <input
                    type="tel"
                    name="phone"
                    class="form-control"
                    placeholder="Phone Number"
                    maxlength="10"
                    required
                    oninput="this.value=this.value.replace(/[^0-9]/g,'')">

                </div>

                <div class="col-12">

                  <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Your Email"
                    required>

                </div>

                <div class="col-12">

                  <input
                    type="text"
                    name="subject"
                    class="form-control"
                    placeholder="Subject"
                    required>

                </div>

                <div class="col-12">

                  <textarea
                    name="message"
                    rows="6"
                    class="form-control"
                    placeholder="Message"
                    required></textarea>

                </div>

                <div class="col-12 text-center">

                  <button type="submit" class="btn btn-primary">

                    Send Message

                  </button>

                </div>

              </div>

            </form>

          </div>

        </div>

      </div>

    </div>

  </section>

  <!-- ================= FOOTER ================= -->

  <footer class="footer">

    <div class="container">

      <p>© FolioOne | All Rights Reserved</p>

    </div>

  </footer>

  <!-- Bootstrap JS -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
